<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة تدريب المبرمجين الناشئين</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs/loader.min.js"></script>
</head>
<body class="bg-gray-900 text-white font-sans flex flex-col h-screen">

    <header class="bg-gray-800 p-4 flex justify-between items-center shadow-md">
        <h1 class="text-xl font-bold text-emerald-400">💻 منصة المبرمج المحترف</h1>
        <div class="flex items-center gap-4">
            <label for="language-select" class="text-sm">اختر لغة البرمجة:</label>
            <select id="language-select" class="bg-gray-700 text-white p-2 rounded border border-gray-600 focus:outline-none">
                <option value="python">Python</option>
                <option value="java">Java</option>
                <option value="c">C (GCC)</option>
            </select>
            <button id="run-btn" class="bg-emerald-500 hover:bg-emerald-600 text-gray-900 font-bold px-6 py-2 rounded transition shadow-lg">
                تشغيل الكود ▶
            </button>
        </div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row p-4 gap-4 overflow-hidden">
        <div class="flex-1 bg-gray-850 rounded-lg overflow-hidden border border-gray-700 flex flex-col">
            <div class="bg-gray-800 px-4 py-2 text-sm text-gray-400 border-b border-gray-700">محرر الأكواد</div>
            <div id="editor-container" class="flex-1 h-full text-left"></div> <!-- Monaco يفرض التوجه لليسار للأكواد -->
        </div>

        <div class="w-full md:w-1/3 bg-gray-950 rounded-lg flex flex-col border border-gray-700">
            <div class="bg-gray-800 px-4 py-2 text-sm text-gray-400 border-b border-gray-700">المخرجات (Console)</div>
            <pre id="output" class="flex-1 p-4 font-mono text-sm text-green-400 overflow-y-auto whitespace-pre-wrap">اضغط على "تشغيل الكود" لرؤية النتيجة هنا...</pre>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
